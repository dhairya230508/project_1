{% extends "layout.html" %}

{% block title %}Chai Details{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto py-12 px-4 grid grid-cols-1 md:grid-cols-2 gap-10">

  <!-- Image -->
  <div>
    {% if chai.chai_image %}
      <img src="{{ chai.chai_image.url }}"
           alt="{{ chai.name }}"
           class="w-full rounded-lg shadow">
    {% else %}
      <div class="w-full h-64 bg-gray-200 flex items-center justify-center">
        No Image
      </div>
    {% endif %}
  </div>

  <!-- Details -->
  <div>
    <h1 class="text-4xl font-bold mb-4">
      {{ chai.name }}
    </h1>

    <p class="text-gray-600 mb-4">
      {{ chai.description }}
    </p>

    <p class="text-2xl font-semibold text-green-600 mb-6">
      ₹{{ chai.price }}
    </p>

    <button class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
      Buy Now
    </button>

    <a href="{% url 'appHome' %}"
       class="block mt-4 text-blue-600 hover:underline">
       ← Back to Chai List
    </a>
  </div>

</div>
{% endblock %}
