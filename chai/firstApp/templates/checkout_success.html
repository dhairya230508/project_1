{% extends "layout.html" %}

{% block title %}
Order Placed
{% endblock %}

{% block content %}
<section class="bg-stone-950 text-white min-h-[70vh] px-6 py-14">
    <div class="mx-auto max-w-3xl text-center">
        <div class="rounded-[2rem] border border-white/10 bg-white/5 p-10">
            <p class="text-sm font-semibold uppercase tracking-[0.28em] text-amber-300">Success</p>
            <h1 class="mt-4 text-4xl font-black">Your order is placed!</h1>
            <p class="mt-3 text-stone-300/80">
                Thanks for ordering. (Demo flow: your cart was cleared.)
            </p>

            <div class="mt-8 flex flex-wrap justify-center gap-3">
                <a href="{% url 'menu' %}" class="rounded-xl bg-amber-500/90 px-6 py-3 text-sm font-black text-stone-950 shadow-[0_15px_35px_-18px_rgba(234,88,12,0.7)] transition hover:bg-amber-400">
                    Order More
                </a>
                <a href="{% url 'contact' %}" class="rounded-xl border border-white/15 bg-white/5 px-6 py-3 text-sm font-semibold text-stone-100 transition hover:bg-white/10">
                    Contact Us
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
