{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dhairya_23{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #1b1f24, #0d0f12);
      min-height: 100vh;
    }

    /* Brand */
    .brand-font {
      font-family: "Playfair Display", serif;
      font-size: 1.7rem;
      letter-spacing: 1.2px;
    }

    /* Navbar (Glass effect) */
    .navbar {
      backdrop-filter: blur(12px);
      background: rgba(20, 20, 20, 0.75) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Main container */
    .container {
      max-width: 850px;
    }

    /* Card UI (Forms / Posts) */
    .card {
      background: linear-gradient(145deg, #161a1f, #111418);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #5f7cff, #7c8cff);
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-weight: 500;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* Form Inputs */
    .form-control {
      background-color: #0f1216;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 10px;
    }

    .form-control:focus {
      background-color: #0f1216;
      color: #fff;
      border-color: #5f7cff;
      box-shadow: 0 0 0 0.15rem rgba(95, 124, 255, 0.25);
    }

    /* Subtle text */
    .text-muted {
      color: #9aa0a6 !important;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3">
    <a class="navbar-brand brand-font" href="{% url 'tweet_list' %}">
      Talksy
    </a>
  </nav>

  <!-- Page Content -->
  <div class="container py-5">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
