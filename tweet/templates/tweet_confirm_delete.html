{% extends "layout.html" %}

{% block content %}
<div class="container py-5">

  <div class="card shadow p-4 text-center">
    <h3>Are you sure you want to delete this talk?</h3>
    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">
        Yes, Delete
      </button>
      <a href="{% url 'tweet_list' %}" class="btn btn-secondary">
        Cancel
      </a>
    </form>
  </div>

</div>
{% endblock %}
