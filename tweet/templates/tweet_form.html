{% extends "layout.html" %}

{% block title %}
Talk
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card shadow-lg p-4 mt-4">

        <h3 class="mb-4">
            {% if form.instance.pk %}
                Edit Talk
            {% else %}
                Create Talk
            {% endif %}
        </h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-warning" type="submit">
                Submit
            </button>

            <a href="{% url 'tweet_list' %}" class="btn btn-secondary">
                Back
            </a>
        </form>

    </div>
</div>

{% endblock %}
